name: CI

# Проверки качества кода пайплайна G2AI на push в main/feature-ветки и на PR в main.
# Модель-зависимые тесты (@model, требуют bge-m3 543 МБ) в CI пропускаются: -m "not model".
on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check pipeline/scripts

      - name: Mypy (strict)
        run: python -m mypy pipeline/scripts/*.py

      - name: Pytest (без модель-зависимых)
        run: python -m pytest -m "not model"
