# Dependabot: авто-обновление зависимостей через PR.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python-зависимости (requirements.txt + requirements-dev.txt в корне)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # Версии GitHub Actions (.github/workflows/)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
