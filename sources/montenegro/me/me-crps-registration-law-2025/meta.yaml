  rationale: Law establishing Montenegro's Central Register of Business and Other
    Entities (CRPS) as a public electronic database — registration decisions authenticated
    by qualified electronic signature/seal (Art. 7), filing exclusively electronic
    (Art. 19), publication via electronic display on the CRPS website (Art. 35,
    39). Notably transposes EU digitalization-of-company-law directives (2017/1132,
    2019/1151 — Art. 47, applicable from EU accession), directly tying this to
    Montenegro's EU-accession digital-alignment track. Not AI-specific, but genuine
    e-government legal/technical infrastructure (digital-registry pattern) —
    relevant to the digital_sovereignty axis for the montenegro track. Confirmed
    by text (doc.md, OCR path) — all 48 articles present, structure intact (VIII
    sections), readable Montenegrin despite OCR noise typical of a scanned gazette
    issue; also served as the first real-scan field test of convert-ocr (spec,
    PR14), across two rounds of fixes it surfaced — (1) ocr_headings' next-line
    lookahead (blank paragraph separators were defeating Tier 2/3 guards), (2)
    one-PDF-file architecture (raw mutated in-place instead of a .ocr.pdf sidecar,
    with an ocrmypdf-metadata marker so reconversion still re-applies heading
    restoration), (3) Unicode-aware regional keywords (Član/Clan) + OCR-glued-
    number rejoin + CAPS-length recalibration, unifying heading levels that used
    to disagree between pdf_to_markdown's own size clustering and ocr_headings.
  assessed_date: '2026-07-17'
