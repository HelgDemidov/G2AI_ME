# Конфигурация dev-инструментов G2AI-пайплайна.
# Код живёт в pipeline/scripts/; инструменты запускаются ИЗ КОРНЯ репозитория.
# pythonpath/mypy_path подставляют pipeline/scripts в путь поиска модулей,
# поэтому sibling-импорты (`from schema import ...`) резолвятся без conftest-хаков.

[tool.mypy]
plugins = ["pydantic.mypy"]
strict = true
mypy_path = "pipeline/scripts"
explicit_package_bases = true

# networkx/tokenizers/onnxruntime/lxml не поставляют полноценные типы -> не флагать как «нет стабов».
[[tool.mypy.overrides]]
module = ["networkx.*", "tokenizers.*", "onnxruntime.*", "lxml.*"]
ignore_missing_imports = true

[tool.ruff]
target-version = "py312"

[tool.pytest.ini_options]
pythonpath = ["pipeline/scripts"]
testpaths = ["pipeline/scripts/tests"]
markers = [
    "model: тест требует локально скачанную модель bge-m3 (в CI пропускается: -m 'not model')",
    "corpus: тест требует локальный корпус sources/ (в CI пропускается: -m 'not corpus')",
    "ocr: тест требует установленный ocrmypdf (в CI пропускается через skipif — бинарника нет)",
]

[tool.coverage.run]
source = ["pipeline/scripts"]
# тесты (самопокрывающиеся) и CLI-шимы (repo-layout, PR #10 — 8-строчные
# `from X import main`, никогда не исполняются под pytest, реальный код — в
# пакетах) искажали бы Cover% в обе стороны, если бы считались.
omit = [
    "pipeline/scripts/tests/*",
    "pipeline/scripts/ab_eval.py",
    "pipeline/scripts/build_graph.py",
    "pipeline/scripts/corpus_index.py",
    "pipeline/scripts/pdf_to_markdown.py",
    "pipeline/scripts/validate_sources.py",
    "pipeline/scripts/vector_store.py",
]

[tool.coverage.report]
exclude_also = [
    "if __name__ == .__main__.:",
]
# Честный текущий бейзлайн (измерено 2026-07-16, только тесты пакета unit/): 73%.
# Модули с системно низким покрытием — не пробел в тестах, а зависимость от
# внешних ресурсов, недоступных CI (модель bge-m3 — embed.py/bge_tokenizer.py/
# ab_eval.py; известный геометрический пробел pdf_to_markdown.py — адресуется
# спеком convert-graphics). Порог — гейт РЕГРЕССИИ (несколько % запаса ниже
# бейзлайна), не целевой показатель; поднимать вручную по мере роста покрытия.
fail_under = 70
