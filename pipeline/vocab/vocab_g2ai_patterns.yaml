# Контролируемый словарь: g2ai_pattern — ПЕРЕНОСИМЫЙ подход/модель G2AI,
# который документ демонстрирует. Аналитическая ОСЬ СРАВНЕНИЯ между странами —
# ради неё и собирается корпус. Не тема (см. vocab_topics), а паттерн-решение.
# Старт минимальный, растёт органически по мере выявления паттернов в документах.
# Термин = ключ (kebab-case), значение = краткое описание.
terms:
  agent-governance-framework: "Рамочная модель управления агентными системами (жизненный цикл, роли, контроли)"
  tool-call-verification: "Тестирование/верификация вызовов инструментов агентом"
  human-accountability: "Явное распределение ответственности человека за действия агента"
  agent-permissioning: "Ограничение полномочий/прав агента дизайном (limits & permissions)"
  agentic-sandbox: "Регуляторная песочница для агентных госсервисов"
  delegated-agentic-identity: "Делегированная агентная идентичность через гос. PKI/удостоверение"
