# Контролируемый словарь: topics — ТЕМАТИКА документа (DC:Subject), «о чём».
# Для фильтрации/обнаружения. Отличается от g2ai_pattern («какой переносимый подход»).
# Старт минимальный, растёт органически по мере прогона документов.
# Термин = ключ (kebab-case), значение = краткое описание.
terms:
  ai-governance: "Управление ИИ, политика и надзор"
  agentic-ai: "Агентный ИИ (автономные агенты, действующие от имени пользователя)"
  agent-safety: "Безопасность агентов, ограничение рисков"
  risk-management: "Управление рисками ИИ"
  human-oversight: "Значимый человеческий контроль и подотчётность"
  tool-use: "Вызов инструментов/API агентами (tool calls)"
  mcp: "Model Context Protocol и смежные протоколы интеграции"
  digital-identity: "Цифровая идентификация, в т.ч. агентная"
