# Контролируемый словарь: authority — НОРМАТИВНАЯ СИЛА документа.
# Ортогонально doc_type. Аналитически критично: обязательная норма != soft-law != отчёт.
# Термин = ключ, значение = краткое описание.
terms:
  binding_law: "Обязательный к исполнению закон"
  regulation: "Обязательный подзаконный акт/регламент"
  soft_law: "Мягкое право: рекомендации, руководства, необязательные фреймворки"
  voluntary_standard: "Добровольный стандарт (ISO/IEC и т.п., без обязательности)"
  report: "Аналитический/описательный документ без нормативной силы"
  draft: "Проект/черновик (ещё не принят)"
