# Контролируемый словарь: doc_type — ФОРМА/жанр документа (DC:Type).
# Растёт органически по мере прогона новых документов. Валидируется validate_sources.py.
# Термин = ключ (kebab-case, стабильный), значение = краткое описание.
terms:
  national_strategy: "Национальная стратегия/план (напр. AI Strategy до 2030)"
  framework: "Рамочный/модельный документ (governance framework, модельная структура)"
  legislation: "Закон/законодательный акт (принятый)"
  regulation: "Подзаконный акт/регламент/техрегулирование"
  technical_standard: "Технический стандарт (ISO/IEC, IEEE и т.п.)"
  technical_spec: "Техническая спецификация/протокол (напр. MCP spec)"
  guidance: "Руководство/методические рекомендации (soft-law)"
  report: "Отчёт/аналитический доклад (гос., IGO, think tank, индустрия)"
  academic_paper: "Академическая статья/препринт"
